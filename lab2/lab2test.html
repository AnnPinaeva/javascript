<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тестирование lab2.js</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/mocha/3.2.0/mocha.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mocha/3.2.0/mocha.js"></script>
    <script>mocha.setup('bdd');</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chai/3.5.0/chai.js"></script>
    <script>let assert = chai.assert;</script>
</head>
<body>
    <div id="mocha"></div>

    <script type="module">
        import {
            pow,
            sumTo,
            isLeapYear,
            factorial,
            fib,
            compare,
            sum,
            addBlackSpot
        } from './lab2.js';

        describe("pow", function () {
            it("pow(2, 2) => 4", () => assert.strictEqual(pow(2, 2), 4));
            it("pow(2, 0) => 1", () => assert.strictEqual(pow(2, 0), 1));
            it("pow(2, -2) => 0.25", () => assert.strictEqual(pow(2, -2), 0.25));
        });

        describe("sumTo", function () {
            it("sumTo(100) => 5050", () => assert.strictEqual(sumTo(100), 5050));
        });

        describe("isLeapYear", function () {
            it("isLeapYear(2024) => true", () => assert.isTrue(isLeapYear(2024)));
            it("isLeapYear(2025) => false", () => assert.isFalse(isLeapYear(2025)));
            it("isLeapYear(2000) => true", () => assert.isTrue(isLeapYear(2000)));
            it("isLeapYear(1900) => false", () => assert.isFalse(isLeapYear(1900)));
        });

        describe("factorial", function () {
            it("factorial(0) => 1n", () => assert.strictEqual(factorial(0), 1n));
            it("factorial(5) => 120n", () => assert.strictEqual(factorial(5), 120n));
        });

        describe("fib", function () {
            it("fib(0) => 0n", () => assert.strictEqual(fib(0), 0n));
            it("fib(100) => 354224848179261915075n", () => assert.strictEqual(fib(100), 354224848179261915075n));
        });

        describe("compare", function () {
            it("compare(5)(4) => false", () => assert.isFalse(compare(5)(4)));
            it("compare(5)(5) => null", () => assert.isNull(compare(5)(5)));
            it("compare(5)(6) => true", () => assert.isTrue(compare(5)(6)));
        });

        describe("sum", function () {
            it("sum() => 0", () => assert.strictEqual(sum(), 0));
            it("sum(1) => 1", () => assert.strictEqual(sum(1), 1));
            it("sum(1, 2) => 3", () => assert.strictEqual(sum(1, 2), 3));
        });

        describe("addBlackSpot", function () {
            it("addBlackSpot({}) => {[Symbol.for('blackSpot')]: true}", () => assert.deepEqual(addBlackSpot({}), {[Symbol.for('blackSpot')]: true}));
            it("addBlackSpot(obj) === obj", () => {
                let obj = {};
                assert.strictEqual(addBlackSpot(obj), obj);
            });
            it("addBlackSpot(obj) has property Symbol.for('blackSpot')=true", () => assert.propertyVal(addBlackSpot({}), Symbol.for("blackSpot"), true));
        });

        mocha.run();
    </script>
</body>
</html>
