<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Задание 3 - Редактируемый div</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        .editable {
            background: #f9f9f9;
            border: 2px dashed #4CAF50;
            padding: 15px;
            border-radius: 8px;
            min-height: 100px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .editable:hover {
            background: #e8f4f8;
        }
        textarea {
            width: 100%;
            padding: 12px;
            font-size: 14px;
            border: 2px solid #4CAF50;
            border-radius: 8px;
            font-family: inherit;
            resize: vertical;
        }
        .info {
            margin-top: 15px;
            padding: 10px;
            background: #e8f4f8;
            border-radius: 5px;
            font-size: 14px;
        }
        kbd {
            background: #333;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✏️ Редактируемый div</h1>
        <div id="editableDiv" class="editable">
            Нажми <kbd>Ctrl+E</kbd> для редактирования. <kbd>Ctrl+S</kbd> сохранить, <kbd>Esc</kbd> отменить.
        </div>
        <div class="info">
            💡 Попробуй: <kbd>Ctrl+E</kbd> → измени текст → <kbd>Ctrl+S</kbd> или <kbd>Esc</kbd>
        </div>
    </div>

    <script>
        const container = document.getElementById('editableDiv');
        let textarea = null;
        let originalContent = '';

        function enterEditMode() {
            originalContent = container.innerHTML;
            textarea = document.createElement('textarea');
            textarea.value = originalContent;
            textarea.style.width = '100%';
            container.innerHTML = '';
            container.appendChild(textarea);
            textarea.focus();
        }

        function saveAndExit() {
            if (textarea) {
                container.innerHTML = textarea.value;
                textarea = null;
            }
        }

        function cancelEdit() {
            if (textarea) {
                container.innerHTML = originalContent;
                textarea = null;
            }
        }

        document.addEventListener('keydown', function(e) {
            if (e.target === container || (textarea && e.target === textarea)) {
                if (e.ctrlKey && e.key === 'e') {
                    e.preventDefault();
                    if (!textarea) enterEditMode();
                }
                else if (e.ctrlKey && e.key === 's') {
                    e.preventDefault();
                    if (textarea) saveAndExit();
                }
                else if (e.key === 'Escape') {
                    if (textarea) cancelEdit();
                }
            }
        });
    </script>
</body>
</html>
