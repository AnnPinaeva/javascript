<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Задание 3 - Редактируемый div</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        #editableDiv {
            background: #f9f9f9;
            border: 2px dashed #4CAF50;
            padding: 20px;
            border-radius: 8px;
            min-height: 100px;
            cursor: pointer;
            transition: all 0.3s;
        }
        #editableDiv:hover {
            background: #e8f4f8;
        }
        textarea {
            width: 100%;
            padding: 12px;
            font-size: 14px;
            border: 2px solid #4CAF50;
            border-radius: 8px;
            font-family: inherit;
            resize: vertical;
            box-sizing: border-box;
        }
        .info {
            margin-top: 15px;
            padding: 10px;
            background: #e8f4f8;
            border-radius: 5px;
            font-size: 14px;
        }
        kbd {
            background: #333;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Редактируемый div</h1>
        <div id="editableDiv" tabindex="0">
            Нажми <kbd>Ctrl+E</kbd> для редактирования. <kbd>Ctrl+S</kbd> сохранить, <kbd>Esc</kbd> отменить.
        </div>
        <div class="info">
            💡 Кликни на область выше → нажми <kbd>Ctrl+E</kbd> → измени текст → <kbd>Ctrl+S</kbd> или <kbd>Esc</kbd>
        </div>
    </div>

    <script>
        const div = document.getElementById('editableDiv');
        let isEditing = false;
        let originalText = '';

        function startEdit() {
            originalText = div.innerHTML;
            const textarea = document.createElement('textarea');
            textarea.value = originalText;
            textarea.id = 'editTextarea';
            div.innerHTML = '';
            div.appendChild(textarea);
            textarea.focus();
            isEditing = true;
        }

        function saveEdit() {
            const textarea = document.getElementById('editTextarea');
            if (textarea) {
                div.innerHTML = textarea.value;
            }
            isEditing = false;
        }

        function cancelEdit() {
            div.innerHTML = originalText;
            isEditing = false;
        }

        div.addEventListener('click', function() {
            div.focus();
        });

        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'e') {
                e.preventDefault();
                if (!isEditing) {
                    startEdit();
                }
            }
            else if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                if (isEditing) {
                    saveEdit();
                }
            }
            else if (e.key === 'Escape') {
                if (isEditing) {
                    cancelEdit();
                }
            }
        });
    </script>
</body>
</html>
