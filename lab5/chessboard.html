<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Шахматная доска</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
        }
        .chessboard {
            border-collapse: collapse;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .chessboard td {
            width: 60px;
            height: 60px;
            text-align: center;
            vertical-align: middle;
            font-size: 14px;
            font-weight: bold;
        }
        .chessboard th {
            width: 60px;
            height: 30px;
            font-weight: normal;
            color: #555;
        }
        .light {
            background-color: #ffce9e;
        }
        .dark {
            background-color: #d18b47;
        }
        .letter-col, .number-col {
            background-color: #f0f0f0;
            border: none;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div>
        <h1>♜ Шахматная доска ♞</h1>
        <table class="chessboard" cellspacing="0">
            <tr>
                <th></th>
                <th>a</th><th>b</th><th>c</th><th>d</th><th>e</th><th>f</th><th>g</th><th>h</th>
                <th></th>
            </tr>
            <script>
                const board = document.currentScript.parentElement;
                for (let row = 8; row >= 1; row--) {
                    const tr = document.createElement('tr');
                    const thLeft = document.createElement('th');
                    thLeft.textContent = row;
                    thLeft.className = 'number-col';
                    tr.appendChild(thLeft);
                    for (let col = 0; col < 8; col++) {
                        const td = document.createElement('td');
                        const isDark = (row + col) % 2 === 0;
                        td.className = isDark ? 'dark' : 'light';
                        tr.appendChild(td);
                    }
                    const thRight = document.createElement('th');
                    thRight.textContent = row;
                    thRight.className = 'number-col';
                    tr.appendChild(thRight);
                    board.appendChild(tr);
                }
                const footerRow = document.createElement('tr');
                footerRow.appendChild(document.createElement('th'));
                for (let col = 0; col < 8; col++) {
                    const th = document.createElement('th');
                    th.textContent = String.fromCharCode(97 + col);
                    th.className = 'letter-col';
                    footerRow.appendChild(th);
                }
                footerRow.appendChild(document.createElement('th'));
                board.appendChild(footerRow);
            </script>
        </table>
    </div>
</body>
</html>
