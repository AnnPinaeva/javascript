<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Задание 2 — Считать ворон</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 50px;
        }
        input, button {
            padding: 8px;
            font-size: 16px;
        }
        button {
            background-color: #0366d6;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0256b3;
        }
    </style>
</head>
<body>

    <h1>🐦 Задание 2: Считать ворон</h1>
    <p>Введите количество ворон:</p>
    <input type="number" id="crowsInput" placeholder="например: 5">
    <button onclick="countCrows()">Считать</button>

    <script>
        'use strict';

        function countCrows() {
            let input = document.getElementById('crowsInput');
            let num = parseInt(input.value);

            if (isNaN(num) || num < 0) {
                alert('Введите целое положительное число');
                return;
            }

            let lastDigit = num % 10;
            let lastTwo = num % 100;
            let word = '';

            // if/else для исключений 11-14
            if (lastTwo >= 11 && lastTwo <= 14) {
                word = 'ворон';
            } else {
                // switch для всех остальных случаев
                switch (lastDigit) {
                    case 1:
                        word = 'ворон';
                        break;
                    case 2:
                    case 3:
                    case 4:
                        word = 'вороны';
                        break;
                    default:
                        word = 'ворон';
                }
            }

            alert(`На ветке сидит ${num} ${word}`);
        }
    </script>

</body>
</html>
