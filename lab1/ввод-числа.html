<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Задание 3 — Ввод числа больше 100</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #fff;
        }
        a {
            display: inline-block;
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        a:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <h1>Задание 3: Ввод числа больше 100</h1>
    <a href="https://AnnPinaeva.github.io/javascript/" id="numberLink">Получить число</a>

    <script>
        'use strict';

        const link = document.getElementById('numberLink');

        link.addEventListener('click', function(event) {
            let userInput;
            let number;

            while (true) {
                userInput = prompt('Введите число больше 100:');

                if (userInput === null) {
                    const allow = confirm('Вы не ввели число. Перейти всё равно?');
                    if (!allow) {
                        event.preventDefault();
                    }
                    return;
                }

                number = Number(userInput);

                if (!isNaN(number) && number > 100) {
                    return;
                }

                alert('Ошибка: нужно ввести число больше 100');
            }
        });
    </script>
</body>
</html>
