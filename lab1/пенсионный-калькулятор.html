<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пенсионный калькулятор</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 50px;
        }
        form {
            max-width: 400px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
        }
        input, button {
            margin: 10px 0;
            padding: 8px;
        }
        textarea {
            width: 100%;
            margin-top: 10px;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Пенсионный калькулятор</h1>
    <form id="pensionForm">
        <div>
            <label>Ваш возраст:</label><br>
            <input type="number" id="age" name="age" required placeholder="например, 30">
        </div>
        
        <div>
            <label>Ваш пол:</label><br>
            <label>
                <input type="radio" name="gender" value="male" required> Мужчина
            </label>
            <label>
                <input type="radio" name="gender" value="female" required> Женщина
            </label>
        </div>
        
        <button type="submit">Рассчитать</button>
        
        <div>
            <label>Результат:</label><br>
            <textarea id="result" rows="4" readonly placeholder="Здесь будет результат..."></textarea>
        </div>
    </form>

    <script>
        'use strict';
        
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('pensionForm');
            const resultArea = document.getElementById('result');
            
            form.addEventListener('submit', function(event) {
                event.preventDefault();
                
                const age = parseInt(document.getElementById('age').value);
                const selectedGender = document.querySelector('input[name="gender"]:checked');
                
                if (isNaN(age)) {
                    resultArea.value = 'Ошибка: введите возраст';
                    return;
                }
                
                if (!selectedGender) {
                    resultArea.value = 'Ошибка: выберите пол';
                    return;
                }
                
                const gender = selectedGender.value;
                let message = '';
                
                if (age >= 0 && age <= 17) {
                    message = 'Вам работать ещё рано — учитесь';
                }
                else if (gender === 'male' && age >= 18 && age <= 59) {
                    message = 'Вам ещё работать и работать';
                }
                else if (gender === 'female' && age >= 18 && age <= 54) {
                    message = 'Вам ещё работать и работать';
                }
                else if (gender === 'male' && age >= 60 && age <= 64) {
                    message = 'Скоро пенсия!';
                }
                else if (gender === 'female' && age >= 55 && age <= 59) {
                    message = 'Скоро пенсия!';
                }
                else if (gender === 'male' && age >= 65) {
                    message = 'Вам пора на пенсию';
                }
                else if (gender === 'female' && age >= 60) {
                    message = 'Вам пора на пенсию';
                }
                else {
                    message = 'Да кто ты такой?';
                }
                
                resultArea.value = message;
            });
        });
    </script>
</body>
</html>
