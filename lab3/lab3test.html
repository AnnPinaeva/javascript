<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тестирование lab3.js</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/mocha/3.2.0/mocha.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mocha/3.2.0/mocha.js"></script>
    <script>mocha.setup('bdd');</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chai/3.5.0/chai.js"></script>
    <script>let assert = chai.assert;</script>
</head>
<body>
    <script type="module">
        import { fib } from '../lab2/lab2.js';
        import {
            getDecimal,
            normalizeUrl,
            checkSpam,
            truncate,
            camelize,
            arrReverseSorted,
            unique
        } from './lab3.js';

        // Переопределим fibs, чтобы использовать импортированный fib
        function fibs(n) {
            const result = [];
            for (let i = 0; i < n; i++) {
                result.push(fib(i));
            }
            return result;
        }

        describe("getDecimal", function () {
            it("getDecimal(1.23) => 0.23", () => assert.strictEqual(getDecimal(1.23), 0.23));
            it("getDecimal(-1.23) => 0.77", () => assert.strictEqual(getDecimal(-1.23), 0.77));
            it("getDecimal(1) => 0", () => assert.strictEqual(getDecimal(1), 0));
        });

        describe("normalizeUrl", function () {
            it("normalizeUrl('yandex.ru') => 'https://yandex.ru'", () => assert.strictEqual(normalizeUrl('yandex.ru'), 'https://yandex.ru'));
            it("normalizeUrl('http://yandex.ru') => 'https://yandex.ru'", () => assert.strictEqual(normalizeUrl('http://yandex.ru'), 'https://yandex.ru'));
            it("normalizeUrl('https://yandex.ru') => 'https://yandex.ru'", () => assert.strictEqual(normalizeUrl('https://yandex.ru'), 'https://yandex.ru'));
            it("normalizeUrl('https.ru') => 'https://https.ru'", () => assert.strictEqual(normalizeUrl('https.ru'), 'https://https.ru'));
        });

        describe("checkSpam", function () {
            it("checkSpam('_XxX_') => true", () => assert.isTrue(checkSpam('_XxX_')));
            it("checkSpam('__Viagra__') => true", () => assert.isTrue(checkSpam('__Viagra__')));
            it("checkSpam('test') => false", () => assert.isFalse(checkSpam('test')));
        });

        describe("truncate", function () {
            it("truncate('Мама мыла раму.', 100) => 'Мама мыла раму.'", () => assert.strictEqual(truncate('Мама мыла раму.', 100), 'Мама мыла раму.'));
            it("truncate('Мама мыла раму.', 10) => 'Мама мыла…'", () => assert.strictEqual(truncate('Мама мыла раму.', 10), 'Мама мыла…'));
        });

        describe("camelize", function () {
            it("camelize('var-test-text') => 'varTestText'", () => assert.strictEqual(camelize('var-test-text'), 'varTestText'));
            it("camelize('person__eye--blue') => 'person__eyeBlue'", () => assert.strictEqual(camelize('person__eye--blue'), 'person__eyeBlue'));
        });

        describe("fibs", function () {
            it("fibs(5) => [0n, 1n, 1n, 2n, 3n]", () => assert.deepEqual(fibs(5), [0n, 1n, 1n, 2n, 3n]));
        });

        describe("arrReverseSorted", function () {
            it("arrReverseSorted([1, 3, 22]) => [22, 3, 1]", () => assert.deepEqual(arrReverseSorted([1, 3, 22]), [22, 3, 1]));
        });

        describe("unique", function () {
            it("unique([0, 1, 1, 2]) => [0, 1, 2]", () => assert.deepEqual(unique([0, 1, 1, 2]), [0, 1, 2]));
            it("unique(['a', 'b', 'c', 'c']) => ['a', 'b', 'c']", () => assert.deepEqual(unique(['a', 'b', 'c', 'c']), ['a', 'b', 'c']));
        });

        mocha.run();
    </script>
    <div id="mocha"></div>
</body>
</html>
